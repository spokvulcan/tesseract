name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# One review per PR at a time; a new push cancels the stale in-flight review
# instead of letting both run to completion.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write # required to post the review as PR comments
      issues: write # required to post the summary / apply labels
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Built-in /code-review skill (no plugin marketplace needed).
          # Args: <effort-word> <PR#> --comment
          #   effort-word `high` is the documented default review breadth;
          #   `max` (broadest non-cloud level) pushed runs to 20-30+ min.
          #   Review scoping rules (skip paths, nit cap, severity, doc-drift
          #   checks) live in REVIEW.md at the repo root.
          prompt: '/code-review high ${{ github.event.pull_request.number }} --comment'
          # Sonnet is the fast-CI choice: near-parity review quality at ~2x
          # the output speed and a fraction of the cost of Opus. --effort
          # medium caps the session thinking level (separate scale from the
          # skill effort word). Target: ~5 min typical; the 15-min job
          # timeout is the backstop.
          claude_args: |
            --model sonnet
            --effort medium
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

