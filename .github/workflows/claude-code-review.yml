name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# One review per PR at a time; a new push cancels the stale in-flight review
# instead of letting both run to completion.
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write # required to post the review as PR comments
      issues: write # required to post the summary / apply labels
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Built-in /code-review skill (no plugin marketplace needed).
          # Args: <effort-word> <PR#> --comment
          #   effort-word: low|medium|high|max|ultra (review breadth; `max` is
          #     the broadest non-cloud level). `--comment` posts inline PR
          #     comments instead of just printing the review.
          prompt: |
            /code-review max ${{ github.event.pull_request.number }} --comment

            Additionally, flag documentation drift: call it out if the PR
            renames, moves, or deletes a module that ARCHITECTURE.md names;
            introduces domain vocabulary that CONTEXT.md lacks; or changes a
            test workflow documented in docs/testing.md.
          # `--model opus` pins the latest Opus; `--effort medium` keeps the
          # session thinking level moderate (separate scale from the skill
          # effort word) — xhigh pushed review runs to 20-30+ min.
          claude_args: |
            --model opus
            --effort medium
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

