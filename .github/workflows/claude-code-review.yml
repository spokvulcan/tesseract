name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # required to post the review as PR comments
      issues: write # required to post the summary / apply labels
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Built-in /code-review skill (no plugin marketplace needed).
          # Args: <effort-word> <PR#> --comment
          #   effort-word: low|medium|high|max|ultra (review breadth; `max` is
          #     the broadest non-cloud level). `--comment` posts inline PR
          #     comments instead of just printing the review.
          prompt: '/code-review max ${{ github.event.pull_request.number }} --comment'
          # `--model opus` pins the latest Opus; `--effort xhigh` raises the
          # session thinking level (separate scale from the skill effort word).
          claude_args: |
            --model opus
            --effort xhigh
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

