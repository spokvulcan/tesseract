# SwiftLint — Tesseract Agent
#
# Local-only quality gate, run via pre-commit on staged files (no CI yet).
# Division of labour: swift-format owns whitespace / width / indentation /
# import order; SwiftLint owns idiom & correctness smells. Rules that overlap
# with the formatter are disabled here so the two tools never fight.
#
# Structural-size limits are deliberately lenient: this is an evolving MVP
# mid-refactor (see CLAUDE.md) — the gate should catch real smells, not nag
# about file length.
#
# Rule reference: https://realm.github.io/SwiftLint/rule-directory.html

included:
  - tesseract
  - tesseractTests
  - tesseractUITests

excluded:
  - Vendor
  - .build
  - DerivedData

disabled_rules:
  # Owned by swift-format — disabled to avoid double-reporting / conflicts.
  - line_length
  - trailing_comma
  - trailing_whitespace
  - trailing_newline
  - vertical_whitespace
  - opening_brace
  - statement_position
  - colon
  - comma
  # Intentional in this codebase.
  - todo # TODO/FIXME are tracked deliberately, not lint debt.

opt_in_rules:
  - empty_count
  - empty_string
  - empty_collection_literal
  - first_where
  - last_where
  - contains_over_first_not_nil
  - sorted_first_last
  - toggle_bool
  - redundant_nil_coalescing
  - explicit_init
  - overridden_super_call
  - prefer_self_type_over_type_of_self

# Structural limits — lenient warnings, generous errors.
type_body_length:
  warning: 600
  error: 1500
file_length:
  warning: 1000
  error: 2500
  ignore_comment_only_lines: true
function_body_length:
  warning: 120
  error: 300
function_parameter_count:
  warning: 8
  error: 12
cyclomatic_complexity:
  warning: 25
  error: 45
large_tuple:
  warning: 3
  error: 4
nesting:
  type_level: 3

identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 60
    error: 80
type_name:
  max_length:
    warning: 50
    error: 60
